<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Slots</title>
    <link rel="icon" type="image/png" href="bilder/crown.png">
    <link rel="stylesheet" href="slots.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<nav>
    <img src="bilder/royal-flush-logo-utenbakgrunn.svg" alt="logo">
    <div class="navlinks">
        <a href="index.html">Main</a>
    </div>
</nav>
<section id="hero">
    <div class="slot-machine">
        <div class="bokser">
            <div class="boks">
                <i id="boks1" class="fa-solid fa-lemon"></i>
            </div>
            <div class="boks">
                <i id="boks2" class="fa-solid fa-bell"></i>
            </div>
            <div class="boks">
                <i id="boks3" class="fa-solid fa-star"></i>
            </div>
        </div>
            <div class="bar">
        <div class="info">
            <p>Balance: $ <span id="balance">100</span></p>
            <div class="bet-control">
                <button id="betDown">-</button>
                <p>Bet: $ <span id="bet">10</span></p>
                <button id="betUp">+</button>
            </div>
        </div>
        <button id="spin">SPIN</button>
        <p id="result">Press Spin To Play!</p>
         </div>
    </div>

</section>
<script src="slots.js"></script>
</body> 
</html>
